apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-governance-frontend
  labels:
    {{- include "aks-governance.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: aks-governance-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aks-governance-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          ports:
            - containerPort: 3000
          env:
            {{- range $key, $value := .Values.frontend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: 3000
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: aks-governance-frontend
spec:
  selector:
    app.kubernetes.io/name: aks-governance-frontend
  ports:
    - port: 3000
      targetPort: 3000

