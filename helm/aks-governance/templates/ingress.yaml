{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aks-governance
  annotations:
    .ingress.kubernetes.io/proxy-body-size: 4m
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: aks-governance-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aks-governance-frontend
                port:
                  number: 3000
{{- end }}

