apiVersion: v1
kind: Secret
metadata:
  name: aks-governance-api
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.backend.secretEnv.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.backend.secretEnv.REDIS_URL | quote }}
  SESSION_SECRET: {{ .Values.backend.secretEnv.SESSION_SECRET | quote }}
  AZURE_CLIENT_SECRET: {{ .Values.backend.secretEnv.AZURE_CLIENT_SECRET | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-governance-api
  labels:
    {{- include "aks-governance.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: aks-governance-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aks-governance-api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: api
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: aks-governance-api
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/v1/readyz
              port: 8000
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 8000
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aks-governance-api
spec:
  selector:
    app.kubernetes.io/name: aks-governance-api
  ports:
    - port: 8000
      targetPort: 8000

